<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>
智能改造优化中心
</title>


<link rel="stylesheet" href="css/style.css">


<script src="./node_modules/chart.js/dist/chart.umd.js"></script>


</head>


<body>


<header>


<div class="logo">

⚙ 智能改造优化中心

<p>
多目标优化 · 节能降碳 · 智能决策
</p>


</div>



<nav>


<span onclick="location.href='index.html'">
首页
</span>


<span onclick="location.href='diagnosis.html'">
数字诊断
</span>


<span class="active">
改造优化
</span>


<span onclick="location.href='energy.html'">
能源调度
</span>


</nav>


</header>





<div class="optimization-layout">



<!-- 左 -->

<div class="panel">


<h2>
🎯 优化目标
</h2>



<div class="slider-box">


<p>
节能权重：
<span id="energyValue">
50%
</span>

</p>


<input 
type="range"
min="0"
max="100"
value="50"
id="energy"
>



<p>

成本权重：

<span id="costValue">
30%
</span>

</p>


<input 
type="range"
min="0"
max="100"
value="30"
id="cost"
>



<p>

碳排权重：

<span id="carbonValue">
20%
</span>

</p>



<input 
type="range"
min="0"
max="100"
value="20"
id="carbon"
>


</div>



<button onclick="generatePlan()">

开始智能优化

</button>



</div>






<!-- 中间 -->


<div class="panel plan">


<h1>
Pareto最优方案
</h1>



<div id="result">


等待优化...


</div>



</div>







<!-- 右 -->

<div class="panel">


<h2>
优化效果
</h2>


<canvas id="energyChart"></canvas>



<div class="result-card">


<h3>
综合评价
</h3>


<p id="stars">
☆☆☆☆☆
</p>


<p>
推荐等级：

<span id="level">
待计算

</span>

</p>


<p>
节能潜力：

<span id="saving">
--

</span>

</p>


<p>
碳减排：

<span id="carbonReduce">
--

</span>

</p>


</div>


</div>



</div>




<script src="js/optimization.js"></script>


</body>


</html>
